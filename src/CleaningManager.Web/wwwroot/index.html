<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CleaningManager.Web</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="CleaningManager.Web.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <video id="bgVideo" autoplay muted playsinline style="position:fixed;inset:0;width:100%;height:100%;
                  object-fit:cover;transform-origin:58% center;z-index:0;">
        <source src="console3.mp4" type="video/mp4" />
    </video>

    <div id="app" style="position:relative;z-index:1;opacity:0;transition:opacity 0.6s ease;">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        var bgVideo = document.getElementById('bgVideo');

        bgVideo.addEventListener('ended', function () {
            // zoom suave na tela verde
            bgVideo.style.transition = 'transform 1.2s cubic-bezier(0.4, 0, 0.2, 1)';
            bgVideo.style.transform = 'scale(1.8)';

            // HUD aparece depois do zoom
            setTimeout(function () {
                document.getElementById('app').style.opacity = '1';
            }, 1000);
        });

        function scrollToBottom(id) {
            var el = document.getElementById(id);
            if (el) el.scrollTop = el.scrollHeight;
        }
    </script>
</body>

</html>
